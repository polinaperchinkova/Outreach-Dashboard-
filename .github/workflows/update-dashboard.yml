name: Update Outreach Dashboard

on:
  schedule:
    - cron: '0 9 * * 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run dashboard update script
        env:
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
        run: python update_dashboard.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "bot@datamasters.co"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update dashboard $(date '+%Y-%m-%d')"
          git push
